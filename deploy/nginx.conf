server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/skill-tree-builder;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Long-lived cache for hashed assets (JS/CSS bundles emitted by Vite)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must never be cached so the browser always fetches the latest
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Route all requests through index.html (SPA client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
