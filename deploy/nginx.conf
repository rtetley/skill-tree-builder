server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # SSL certificate paths — replace with your actual certificate files
    # (e.g. provisioned by Certbot: /etc/letsencrypt/live/<domain>/...)
    ssl_certificate     /etc/ssl/certs/skill-tree-builder.crt;
    ssl_certificate_key /etc/ssl/private/skill-tree-builder.key;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # HSTS — tells browsers to always use HTTPS (enable once SSL is confirmed working)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/skill-tree-builder;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Long-lived cache for hashed assets (JS/CSS bundles emitted by Vite)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must never be cached so the browser always fetches the latest
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Route all requests through index.html (SPA client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
